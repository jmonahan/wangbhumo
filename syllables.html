<!DOCTYPE html>
<html lang="bo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tibetan Syllable Audio Grid</title>
  <link rel="stylesheet" href="style.css">
  <script src="shared-layout.js"></script>
</head>
<body>

  <!-- Shared Universal Navigation -->
  <site-nav></site-nav>

  <div class="container">
    <header>
      <h1>གསལ་བྱེད་སུམ་ཅུ།</h1>
      <p class="subtitle">Tibetan 30 Syllables — Click any syllable to hear transmission</p>
    </header>

    <!-- Customization / Settings Bar -->
    <div class="controls-container">
      <div class="control-group">
        <input type="checkbox" id="toggleEng">
        <label for="toggleEng">Show Pronunciation Tip (ENG)</label>
      </div>
      <div class="control-group">
        <input type="checkbox" id="toggleTips" checked>
        <label for="toggleTips">Show Tone & Aspiration</label>
      </div>
    </div>

    <!-- Main Grid Target Elements -->
    <main class="grid-container" id="alphabetGrid"></main>

    <!-- Shared Universal Footer -->
    <site-footer></site-footer>
  </div>

  <script>
    // Complete structural dictionary mapping consonants, audio, custom hints, and tips
    const tibetanAlphabet = [
      { tib: "ཀ", eng: "ka", audio: "audio/syllables/01_ka.mp3", tip: "High tone" },
      { tib: "ཁ", eng: "kha", audio: "audio/syllables/02_kha.mp3", tip: "High + Aspirated" },
      { tib: "ག", eng: "kaa", audio: "audio/syllables/03_kaa.mp3", tip: "Low tone" },
      { tib: "ང", eng: "nga", audio: "audio/syllables/04_nga.mp3", tip: "Low + Nasal" },
      
      { tib: "ཅ", eng: "cha", audio: "audio/syllables/05_cha.mp3", tip: "High tone" },
      { tib: "ཆ", eng: "chha", audio: "audio/syllables/06_chha.mp3", tip: "High + Aspirated" },
      { tib: "ཇ", eng: "chaa", audio: "audio/syllables/07_chaa.mp3", tip: "Low tone" },
      { tib: "ཉ", eng: "nya", audio: "audio/syllables/08_nya.mp3", tip: "Low + Nasal" },
      
      { tib: "ཏ", eng: "ta", audio: "audio/syllables/09_ta.mp3", tip: "High tone" },
      { tib: "ཐ", eng: "tha", audio: "audio/syllables/10_tha.mp3", tip: "High + Aspirated" },
      { tib: "ད", eng: "taa", audio: "audio/syllables/11_taa.mp3", tip: "Low tone" },
      { tib: "ན", eng: "na", audio: "audio/syllables/12_na.mp3", tip: "Low + Nasal" },
      
      { tib: "པ", eng: "pa", audio: "audio/syllables/13_pa.mp3", tip: "High tone" },
      { tib: "ཕ", eng: "pha", audio: "audio/syllables/14_pha.mp3", tip: "High + Aspirated" },
      { tib: "བ", eng: "paa", audio: "audio/syllables/15_paa.mp3", tip: "Low tone" },
      { tib: "མ", eng: "ma", audio: "audio/syllables/16_ma.mp3", tip: "Low + Nasal" },
      
      { tib: "ཙ", eng: "tsa", audio: "audio/syllables/17_tsa.mp3", tip: "High tone" },
      { tib: "ཚ", eng: "tsha", audio: "audio/syllables/18_tsha.mp3", tip: "High + Aspirated" },
      { tib: "ཛ", eng: "tsaa", audio: "audio/syllables/19_tsaa.mp3", tip: "Low tone" },
      { tib: "ཝ", eng: "wa", audio: "audio/syllables/20_wa.mp3", tip: "Low tone" },
      
      { tib: "ཞ", eng: "shaa", audio: "audio/syllables/21_shaa.mp3", tip: "Low tone" },
      { tib: "ཟ", eng: "saa", audio: "audio/syllables/22_saa.mp3", tip: "Low tone" },
      { tib: "འ", eng: "‘aa", audio: "audio/syllables/23_aa.mp3", tip: "Low tone" },
      { tib: "ཡ", eng: "ya", audio: "audio/syllables/24_ya.mp3", tip: "Low tone" },
      
      { tib: "ར", eng: "raa", audio: "audio/syllables/25_raa.mp3", tip: "Low tone" },
      { tib: "ལ", eng: "laa", audio: "audio/syllables/26_laa.mp3", tip: "Low tone" },
      { tib: "ཤ", eng: "sha", audio: "audio/syllables/27_sha.mp3", tip: "High tone" },
      { tib: "ས", eng: "sa", audio: "audio/syllables/28_sa.mp3", tip: "High tone" },
      
      { tib: "ཧ", eng: "ha", audio: "audio/syllables/29_ha.mp3", tip: "High tone" },
      { tib: "ཨ", eng: "a", audio: "audio/syllables/30_a.mp3", tip: "High tone" }
    ];

    const grid = document.getElementById('alphabetGrid');
    const toggleEng = document.getElementById('toggleEng');
    const toggleTips = document.getElementById('toggleTips');
    
    let currentAudio = null;
    let currentCard = null;

    // Render cards
    tibetanAlphabet.forEach(item => {
      const card = document.createElement('div');
      card.className = 'syllable-card';
      
      card.innerHTML = `
        <span class="tibetan-script">${item.tib}</span>
        <span class="eng-hint hidden">${item.eng}</span>
        <span class="tip-text">${item.tip}</span>
      `;

      const audioObj = new Audio(item.audio);
      audioObj.preload = 'auto';

      card.addEventListener('click', () => {
        if (currentAudio) {
          currentAudio.pause();
          currentAudio.currentTime = 0;
          if (currentCard) currentCard.classList.remove('playing');
        }

        card.classList.add('playing');
        audioObj.play().catch(error => {
          console.error("Audio playback interrupted or blocked:", error);
        });

        currentAudio = audioObj;
        currentCard = card;

        audioObj.onended = () => {
          card.classList.remove('playing');
        };
      });

      grid.appendChild(card);
    });

    // Toggle visibility of the English hints
    toggleEng.addEventListener('change', (e) => {
      const hints = document.querySelectorAll('.eng-hint');
      hints.forEach(hint => {
        if (e.target.checked) {
          hint.classList.remove('hidden');
        } else {
          hint.classList.add('hidden');
        }
      });
    });

    // Toggle visibility of the Tone & Aspiration tips
    toggleTips.addEventListener('change', (e) => {
      const tips = document.querySelectorAll('.tip-text');
      tips.forEach(tip => {
        if (e.target.checked) {
          tip.classList.remove('hidden');
        } else {
          tip.classList.add('hidden');
        }
      });
    });
  </script>
</body>
</html>
