<!DOCTYPE html>
<html lang="bo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tibetan Syllable Audio Grid</title>
  <link rel="stylesheet" href="css/all.css">
  <script type="module" src="js/shared-layout.js"></script>
</head>
<body>

  <!-- Shared Universal Navigation -->
  <site-nav></site-nav>

  <div class="container">
    <header>
      <h1>གསལ་བྱེད་སུམ་ཅུ།</h1>
	  <p class="subtitle" id="subtitleText"></p>
    </header>

    <!-- Unified Shared Controls Bar (Row 1 is built-in globally, Row 2 is empty here) -->
    <site-controls></site-controls>

    <!-- Main Grid Target Elements -->
    <main class="grid-container" id="alphabetGrid"></main>

    <!-- Shared Universal Footer -->
    <site-footer></site-footer>
  </div>

  <script type="module">
      import { createSyllableCard } from './js/shared-layout.js';
      import { t } from './js/i18n.js';
      import { tibetanAlphabet } from './js/syllables_data.js';

      // Function to apply localized text to static elements on the page
      function updatePageText() {
        const subtitleEl = document.getElementById('subtitleText');
        if (subtitleEl) subtitleEl.textContent = t('syllablesSubtitle');
      }

      // Run text updates on initial load
      updatePageText();
    
      let currentAudio = null;
      let currentCard = null;
      let playbackRate = window.globalPlaybackRate || 1.0;

      // Listen for global playback rate changes from the site-controls bar
      window.addEventListener('playbackRateChanged', (e) => {
        playbackRate = e.detail.speed;
        if (currentAudio) {
          currentAudio.playbackRate = playbackRate;
        }
      });

      // Render cards using the shared component template
      tibetanAlphabet.forEach(item => {
        const card = createSyllableCard({
          id: item.id,
          script: item.tib,
          romanization: item.eng,
          tone: t(item.toneKey) // Pulls localized string from i18n.js
        });

        const audioObj = new Audio(`audio/syllables/${item.id}.mp3`);
        audioObj.preload = 'auto';

        card.addEventListener('click', () => {
          if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
            if (currentCard) currentCard.classList.remove('playing');
          }

          audioObj.playbackRate = playbackRate;
          card.classList.add('playing');
          audioObj.play().catch(error => {
            console.error("Audio playback interrupted or blocked:", error);
          });

          currentAudio = audioObj;
          currentCard = card;

          audioObj.onended = () => {
            card.classList.remove('playing');
          };
        });

        const grid = document.getElementById('alphabetGrid');
        if (grid) {
          grid.appendChild(card);
        }
      });
    </script>
</body>
</html>
