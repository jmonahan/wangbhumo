<!DOCTYPE html>
<html lang="bo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tibetan Vowels Study Guide</title>
  <link rel="stylesheet" href="css/all.css">
  <script type="module" src="js/shared-layout.js"></script>

  <style>
    /* Specific styles for Vowel Radio Controls */
	.controls-container{
		padding: 0px;
	}
	
	.vowel-toggle-group {
	  display: flex;
	  gap: 8px;
	  justify-content: center;
	  flex-wrap: wrap;
	}
	.vowel-selector-group{
	  line-height: 1.2;
	}
	
	/* Hide the actual radio button visually while keeping it functional for JS & keyboard navigation */
	.vowel-option input[type="radio"] {
	  position: absolute;
	  opacity: 0;
	  width: 0;
	  height: 0;
	  pointer-events: none;
	}

	/* Style the label as a standalone toggle button */
	.vowel-option {
	  display: inline;
	  align-items: center;
	  margin-right: 10px;
	  padding: 15px 8px 15px 8px;
	  background-color: #ffffff;
	  border: 1px solid var(--gray-light, #e0e0e0);
	  border-radius: 20px;
	  cursor: pointer;
	  font-size: 0.95rem;
	  color: var(--text-dark, #2c3e50);
	  transition: all 0.2s ease;
	  user-select: none;
	}
	
	/* height fix*/
	.vowel-symbol{
	  margin-bottom: 10px;
	  padding: 0px 8px 10px 8px;
	}
	/* Remove margin from the final button so it doesn't push the right edge */
	.vowel-option:last-child {
	  margin-right: 0;
	}
	
	.vowel-symbol{
		font-size: 2.5rem;
	}

	.vowel-symbol-u{margin-top:-10px;}

	.vowel-symbol-i,
	.vowel-symbol-e,
	.vowel-symbol-o{
		display: inline-block;
		transform: translateY(15px);
  	}

	/* Hover state for unselected pills */
	.vowel-option:hover {
	  border-color: var(--accent-maroon, #800000);
	  background-color: rgba(128, 0, 0, 0.03);
	}

	/* ACTIVE/CHECKED STATE: When radio inside is checked, style the parent label */
	.vowel-option:has(input[type="radio"]:checked),
	.vowel-option input[type="radio"]:checked { 
	  background-color: var(--accent-maroon, #800000);
	  color: #ffffff;
	  border-color: var(--accent-maroon, #800000);
	}

	.vowel-option:has(input:checked) {
	  background-color: var(--accent-maroon, #800000);
	  color: #ffffff;
	  border-color: var(--accent-maroon, #800000);
	}
  </style>
</head>
<body>

  <!-- Shared Universal Navigation -->
  <site-nav></site-nav>

  <div class="container">
    <!-- Section 1: Header -->
    <header>
		<h1 class="title-with-audio">
		    <span class="title-spacer" aria-hidden="true"></span>
		    <span class="title-text">དབྱངས་བཞི།</span>
		    <button type="button" class="audio-btn-inline" id="titleAudioBtn" aria-label="Listen to 'Vowels' pronunciation" title="Listen">
		      <svg class="speaker-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
		        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
		        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
		        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
		      </svg>
		    </button>
		  </h1>
		  <p class="subtitle" id="subtitleText"></p>
    </header>

    <!-- Section 2: Vowels Toggle & Customization Bar -->
    <div class="controls-container">
		<div class="sticky-toggle-bar"><div class="vowel-selector-group">
        
        <!-- Base / Default Option -->
        <label class="vowel-option">
          <input type="radio" name="vowelSelect" value="none" checked>
		  <span id="labelNoVowel"></span>
        </label>

        <!-- 1. Gigu (i) -->
        <label class="vowel-option vowel-option-topfix">
          <input type="radio" name="vowelSelect" value="i">
          <span class="vowel-symbol vowel-symbol-i">&#x25CC;&#x0F72;</span>
        </label>

        <!-- 2. Zhabkyu (u) -->
        <label class="vowel-option">
          <input type="radio" name="vowelSelect" value="u">
          <span class="vowel-symbol vowel-symbol-u">&#x0F74;</span>
        </label>

        <!-- 3. Dengbu (e) -->
        <label class="vowel-option vowel-option-topfix">
          <input type="radio" name="vowelSelect" value="e">
          <span class="vowel-symbol vowel-symbol-e">&#x25CC;&#x0F7A;</span>
        </label>

        <!-- 4. Naro (o) -->
        <label class="vowel-option vowel-option-topfix">
          <input type="radio" name="vowelSelect" value="o">
          <span class="vowel-symbol vowel-symbol-o">&#x25CC;&#x0F7C;</span>
        </label>

      </div></div>
    </div>

    <!-- Section 3: Syllables Grid -->
    <main class="grid-container" id="alphabetGrid"></main>

    <!-- Shared Universal Footer -->
    <site-footer></site-footer>
  </div>

  <script type="module">
    import { createSyllableCard } from './js/shared-layout.js';
	import { t } from './js/i18n.js'; // Import translation function
	import { tibetanAlphabet } from './js/syllables_data.js';

	
	// Apply translations on load
    document.getElementById('subtitleText').textContent = t('vowels');
    document.getElementById('labelNoVowel').textContent = t('noVowel');

	// Page Title Audio Clip
	const titleAudio = new Audio("audio/vowels/vowels_title.mp3");
	titleAudio.preload = 'auto';
	titleAudio.playbackRate = 1.5;

	const titleAudioBtn = document.getElementById('titleAudioBtn');
	if (titleAudioBtn) {
	  titleAudioBtn.addEventListener('click', () => {
	    stopAudio(); 
	    titleAudio.currentTime = 0;
	    titleAudio.play().catch(err => console.log("Title audio playback prevented or file missing"));
	    currentAudio = titleAudio;
	  });
	}

    // Dictionary of Tibetan Unicode Combining Vowel Characters
    const vowelMarks = {
      none: "",
      i: "\u0F72", // ི Gigu
      u: "\u0F74", // ུ Zhabkyu
      e: "\u0F7A", // ེ Dengbu
      o: "\u0F7C"  // ོ Naro
    };

    // Dedicated standalone audio for the 4 vowel names
    const vowelAudio = {
      i: new Audio("audio/vowels/kigu.mp3"),
      u: new Audio("audio/vowels/shabkyoo.mp3"),
      e: new Audio("audio/vowels/dengpo.mp3"),
      o: new Audio("audio/vowels/naro.mp3")
    };

	Object.values(vowelAudio).forEach(audio => {
	  audio.playbackRate = 1.5;
	});

    const grid = document.getElementById('alphabetGrid');
    const vowelRadios = document.querySelectorAll('input[name="vowelSelect"]');
    
    let activeVowel = "none";
    let currentAudio = null;
    let currentCard = null;

    // Helper to stop any playing audio
    function stopAudio() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        if (currentCard) currentCard.classList.remove('playing');
      }
    }

    // Function to render / update the 30 grid cards using the component
    function renderGrid() {
      grid.innerHTML = ''; // Clear current grid

      tibetanAlphabet.forEach(item => {
        // Dynamically attach the active Unicode vowel character to the Tibetan base letter
        const displayTibetan = item.tib + vowelMarks[activeVowel];
        
        // Use the shared component factory function
        const card = createSyllableCard({
          id: item.id,
          script: displayTibetan
        });

        // Determine audio path based on active vowel
        let audioPath = "";
        if (activeVowel === "none") {
          audioPath = `audio/syllables/${item.id}.mp3`;
        } else {
          audioPath = `audio/vowels/${item.id}_${activeVowel}.mp3`;
        }

        const audioObj = new Audio(audioPath);
        audioObj.preload = 'auto';

        // Card Click Handler
        card.addEventListener('click', () => {
          stopAudio();

          card.classList.add('playing');
          audioObj.play().catch(error => {
            console.error("Audio playback interrupted or file missing:", audioPath);
          });

          currentAudio = audioObj;
          currentCard = card;

          audioObj.onended = () => {
            card.classList.remove('playing');
          };
        });

        grid.appendChild(card);
      });
    }

    // Radio Button Listener - Switches Vowels
	vowelRadios.forEach(radio => {
	  const playVowelAudio = (vowelKey) => {
	    if (vowelKey !== "none" && vowelAudio[vowelKey]) {
	      stopAudio(); 
	      vowelAudio[vowelKey].currentTime = 0; 
	      vowelAudio[vowelKey].play().catch(err => console.log("Audio play error:", err));
	      currentAudio = vowelAudio[vowelKey];
	    }
	  };

	  radio.addEventListener('change', (e) => {
	    activeVowel = e.target.value;
	    playVowelAudio(activeVowel);
	    renderGrid();
	  });

	  radio.addEventListener('click', (e) => {
	    if (e.target.value === activeVowel) {
	      playVowelAudio(activeVowel);
	    }
	  });
	});

    // Initial Render
    renderGrid();
  </script>
</body>
</html>
