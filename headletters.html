<!DOCTYPE html>
<html lang="bo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tibetan Head Letters Study Guide</title>
  <link rel="stylesheet" href="css/all.css">
  <script type="module" src="js/shared-layout.js"></script>
  <style>
    /* Specific styles for Head Letter Radio Controls */
    .headletter-toggle-group {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* Hide the actual radio button visually while keeping it functional */
    .headletter-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      pointer-events: none;
    }

    /* Style the label as a standalone toggle button */
    .headletter-option {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-right: 6px;
      padding: 10px 16px;
      background-color: #ffffff;
      border: 1px solid var(--gray-light, #e0e0e0);
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.95rem;
      color: var(--text-dark, #2c3e50);
      transition: all 0.2s ease;
      user-select: none;
    }

    .headletter-option:last-child {
      margin-right: 0;
    }

    .headletter-symbol {
      font-size: 1.8rem;
      line-height: 1;
    }

    /* Hover state for unselected pills */
    .headletter-option:hover {
      border-color: var(--accent-maroon, #800000);
      background-color: rgba(128, 0, 0, 0.03);
    }

    /* ACTIVE/CHECKED STATE */
    .headletter-option:has(input[type="radio"]:checked),
    .headletter-option input[type="radio"]:checked {
      background-color: var(--accent-maroon, #800000);
      color: #ffffff;
      border-color: var(--accent-maroon, #800000);
    }
  </style>
</head>
<body>

  <!-- Shared Universal Navigation -->
  <site-nav></site-nav>

  <div class="container">
    <!-- Section 1: Header -->
    <header>
      <h1 class="title-with-audio">
        <!-- Invisible spacer matching button width -->
        <span class="title-spacer" aria-hidden="true"></span>

        <!-- Truly centered text -->
        <span class="title-text">མགོ་ཅན།</span>

        <!-- Fixed-width button on the right -->
        <button type="button" class="audio-btn-inline" id="titleAudioBtn" aria-label="Listen to 'Head Letters' pronunciation" title="Listen">
          <svg class="speaker-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
          </svg>
        </button>
      </h1>
      <p class="subtitle" id="subtitleText"></p>
    </header>

    <!-- Section 2: Head Letters Toggle Bar -->
    <div class="controls-container">
      <div class="sticky-toggle-bar">
        <div class="headletter-toggle-group">
          
          <!-- Base / Default Option -->
          <label class="headletter-option">
            <input type="radio" name="headLetterSelect" value="none" checked>
            <span id="labelBaseOnly"></span>
          </label>

          <!-- 1. Ra-go (ར) -->
          <label class="headletter-option">
            <input type="radio" name="headLetterSelect" value="ra">
            <span class="headletter-symbol">ར</span>
          </label>

          <!-- 2. La-go (ལ) -->
          <label class="headletter-option">
            <input type="radio" name="headLetterSelect" value="la">
            <span class="headletter-symbol">ལ</span>
          </label>

          <!-- 3. Sa-go (ས) -->
          <label class="headletter-option">
            <input type="radio" name="headLetterSelect" value="sa">
            <span class="headletter-symbol">ས</span>
          </label>

        </div>
      </div>
    </div>

    <!-- Section 3: Syllables Grid -->
    <main class="grid-container" id="alphabetGrid"></main>

    <!-- Shared Universal Footer -->
    <site-footer></site-footer>
  </div>

  <script type="module">
    import { createSyllableCard } from './js/shared-layout.js';
    import { t } from './js/i18n.js';
    import { tibetanAlphabet } from './js/syllables_data.js';

    // Apply translations on load
    document.getElementById('subtitleText').textContent = t('headLetters');
    document.getElementById('labelBaseOnly').textContent = t('baseOnly');

    // Page Title Audio Clip
    const titleAudio = new Audio("audio/headletters/headletters_title.mp3");
    titleAudio.preload = 'auto';

    const titleAudioBtn = document.getElementById('titleAudioBtn');
    let currentAudio = null;
    let currentCard = null;

    function stopAudio() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        if (currentCard) currentCard.classList.remove('playing');
      }
    }

    if (titleAudioBtn) {
      titleAudioBtn.addEventListener('click', () => {
        stopAudio();
        titleAudio.currentTime = 0;
        titleAudio.play().catch(err => console.log("Title audio playback prevented or file missing"));
        currentAudio = titleAudio;
      });
    }

    // Dedicated standalone audio for the head letter names
    const headLetterAudio = {
      ra: new Audio("audio/headletters/rago.mp3"),
      la: new Audio("audio/headletters/lago.mp3"),
      sa: new Audio("audio/headletters/sago.mp3")
    };

    Object.values(headLetterAudio).forEach(audio => {
      audio.playbackRate = 1.45;
    });

    /* Head Letter Mappings (keeping rules isolated here) */
    const headLetterData = {
      ra: {
        "01_ka":  { tib: "རྐ", soundShift: false },
        "03_kaa": { tib: "རྒ", soundShift: true, tip: "Low ག shifts to High 'gaa'" },
        "04_nga": { tib: "རྔ", soundShift: true, tip: "Low ང shifts to High nasal" },
        "07_chaa":{ tib: "རྗ", soundShift: true, tip: "Low ཇ shifts to High 'chaa'" },
        "08_nya": { tib: "རྙ", soundShift: true, tip: "Low ཉ shifts to High nasal" },
        "09_ta":  { tib: "རྟ", soundShift: false },
        "11_taa": { tib: "རྡ", soundShift: true, tip: "Low ད shifts to High 'taa'" },
        "12_na":  { tib: "རྣ", soundShift: true, tip: "Low ན shifts to High nasal" },
        "15_paa": { tib: "རྦ", soundShift: true, tip: "Low བ shifts to High 'paa'" },
        "16_ma":  { tib: "རྨ", soundShift: true, tip: "Low མ shifts to High nasal" },
        "17_tsa": { tib: "རྩ", soundShift: false },
        "19_tsaa":{ tib: "རྫ", soundShift: true, tip: "Low ཛ shifts to High 'tsaa'" }
      },
      la: {
        "01_ka":  { tib: "ལྐ", soundShift: false },
        "03_kaa": { tib: "ལྒ", soundShift: true, tip: "Low ག shifts to High 'gaa'" },
        "04_nga": { tib: "ལྔ", soundShift: true, tip: "Low ང shifts to High nasal" },
        "05_cha": { tib: "ལྕ", soundShift: false },
        "07_chaa":{ tib: "ལྗ", soundShift: true, tip: "Low ཇ shifts to High 'chaa'" },
        "09_ta":  { tib: "ལྟ", soundShift: false },
        "11_taa": { tib: "ལྡ", soundShift: true, tip: "Low ད shifts to High 'taa'" },
        "13_pa":  { tib: "ལྤ", soundShift: false },
        "15_paa": { tib: "ལྦ", soundShift: true, tip: "Low བ shifts to High 'paa'" },
        "29_ha":  { tib: "ལྷ", soundShift: true, tip: "Shifts to voiceless 'L'" }
      },
      sa: {
        "01_ka":  { tib: "སྐ", soundShift: false },
        "03_kaa": { tib: "སྒ", soundShift: true, tip: "Low ག shifts to High 'gaa'" },
        "04_nga": { tib: "སྔ", soundShift: true, tip: "Low ང shifts to High nasal" },
        "08_nya": { tib: "སྙ", soundShift: true, tip: "Low ཉ shifts to High nasal" },
        "09_ta":  { tib: "སྟ", soundShift: false },
        "11_taa": { tib: "སྡ", soundShift: true, tip: "Low ད shifts to High 'taa'" },
        "12_na":  { tib: "སྣ", soundShift: true, tip: "Low ན shifts to High nasal" },
        "13_pa":  { tib: "སྤ", soundShift: false },
        "15_paa": { tib: "སྦ", soundShift: true, tip: "Low བ shifts to High 'paa'" },
        "16_ma":  { tib: "སྨ", soundShift: true, tip: "Low མ shifts to High nasal" },
        "17_tsa": { tib: "སྩ", soundShift: false }
      }
    };

    const grid = document.getElementById('alphabetGrid');
    const headLetterRadios = document.querySelectorAll('input[name="headLetterSelect"]');
    let activeHeadLetter = "none";

    function renderGrid() {
      grid.innerHTML = '';

      tibetanAlphabet.forEach(item => {
        let displayTibetan = item.tib;
        let audioPath = `audio/syllables/${item.id}.mp3`;
        let hasShift = false;
        let shiftExplanation = null;
        let isDisabled = false;

        if (activeHeadLetter !== "none") {
			const currentMap = headLetterData[activeHeadLetter];
			const comboData = currentMap ? currentMap[item.id] : null;

			if (comboData) {
				displayTibetan = comboData.tib;
				hasShift = comboData.soundShift === true;
				shiftExplanation = comboData.tip || null;

				// If there is no sound shift, use the base syllable audio file!
				if (!hasShift) {
					audioPath = `audio/syllables/${item.id}.mp3`;
				} else {
					audioPath = `audio/headletters/${item.id}_${activeHeadLetter}.mp3`;
				}
			} else {
				isDisabled = true; // Gray out unsupported letter combos
			}
        }

        // Use your standardized component factory function!
        const card = createSyllableCard({
          id: item.id,
          script: displayTibetan,
          hasSoundShift: hasShift,
          shiftExplanation: shiftExplanation,
          isDisabled: isDisabled
        });

        // Attach audio & click behavior if the card is active/valid
        if (!isDisabled) {
          const audioObj = new Audio(audioPath);
          audioObj.preload = 'auto';

          card.addEventListener('click', () => {
            stopAudio();
            card.classList.add('playing');
            audioObj.play().catch(error => console.error("Audio error:", audioPath));
            currentAudio = audioObj;
            currentCard = card;
            audioObj.onended = () => card.classList.remove('playing');
          });
        }

        grid.appendChild(card);
      });
    }

    headLetterRadios.forEach(radio => {
      const playHLNameAudio = (hlKey) => {
        if (hlKey !== "none" && headLetterAudio[hlKey]) {
          stopAudio();
          headLetterAudio[hlKey].currentTime = 0;
          headLetterAudio[hlKey].play().catch(err => console.log("Audio play error:", err));
          currentAudio = headLetterAudio[hlKey];
        }
      };

      radio.addEventListener('change', (e) => {
        activeHeadLetter = e.target.value;
        playHLNameAudio(activeHeadLetter);
        renderGrid();
      });

      radio.addEventListener('click', (e) => {
        if (e.target.value === activeHeadLetter) {
          playHLNameAudio(activeHeadLetter);
        }
      });
    });

    renderGrid();
  </script>
</body>
</html>
