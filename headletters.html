<!DOCTYPE html>
<html lang="bo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tibetan Head Letters Study Guide</title>
  <link rel="stylesheet" href="css/all.css">
  <script type="module" src="js/shared-layout.js"></script>
  <style>
    /* Specific styles for Head Letter Radio Controls */
    .headletter-toggle-group {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* Hide the actual radio button visually while keeping it functional */
    .headletter-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      pointer-events: none;
    }

    /* Style the label as a standalone toggle button */
    .headletter-option {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-right: 6px;
      padding: 10px 16px;
      background-color: #ffffff;
      border: 1px solid var(--gray-light, #e0e0e0);
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.95rem;
      color: var(--text-dark, #2c3e50);
      transition: all 0.2s ease;
      user-select: none;
    }

    .headletter-option:last-child {
      margin-right: 0;
    }

    .headletter-symbol {
      font-size: 1.8rem;
      line-height: 1;
    }

    /* Hover state for unselected pills */
    .headletter-option:hover {
      border-color: var(--accent-maroon, #800000);
      background-color: rgba(128, 0, 0, 0.03);
    }

    /* ACTIVE/CHECKED STATE */
    .headletter-option:has(input[type="radio"]:checked),
    .headletter-option input[type="radio"]:checked {
      background-color: var(--accent-maroon, #800000);
      color: #ffffff;
      border-color: var(--accent-maroon, #800000);
    }
  </style>
</head>
<body>

  <!-- Shared Universal Navigation -->
  <site-nav></site-nav>

  <div class="container">
    <!-- Section 1: Header -->
    <header>
      <h1 class="title-with-audio">
        <!-- Invisible spacer matching button width -->
        <!-- <span class="title-spacer" aria-hidden="true"></span> -->

        <!-- Truly centered text -->
        <span class="title-text">མགོ་ཅན།</span>

        <!-- Fixed-width button on the right -->
        <!-- <button type="button" class="audio-btn-inline" id="titleAudioBtn" aria-label="Listen to 'Head Letters' pronunciation" title="Listen">
          <svg class="speaker-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
          </svg>
        </button> -->
      </h1>
      <p class="subtitle" id="subtitleText"></p>
    </header>

	<!-- Section 2: Unified Sticky Two-Row Controls Component -->
	    <site-controls>
	      <div class="headletter-toggle-group" style="display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;">
        
	        <!-- Base / Default Option -->
	        <label class="headletter-option">
	          <input type="radio" name="headLetterSelect" value="none" checked>
	          <span id="labelNone"></span>
	        </label>

	        <!-- 1. Ra-go (ར) -->
	        <label class="headletter-option">
	          <input type="radio" name="headLetterSelect" value="ra">
	          <span class="headletter-symbol">ར</span>
	        </label>

	        <!-- 2. La-go (ལ) -->
	        <label class="headletter-option">
	          <input type="radio" name="headLetterSelect" value="la">
	          <span class="headletter-symbol">ལ</span>
	        </label>

	        <!-- 3. Sa-go (ས) -->
	        <label class="headletter-option">
	          <input type="radio" name="headLetterSelect" value="sa">
	          <span class="headletter-symbol">ས</span>
	        </label>

	      </div>
	    </site-controls>

    <!-- Section 3: Syllables Grid -->
    <main class="grid-container" id="alphabetGrid"></main>

    <!-- Shared Universal Footer -->
    <site-footer></site-footer>
  </div>

  <script type="module">
      import { createSyllableCard } from './js/shared-layout.js';
      import { t } from './js/i18n.js';
      import { tibetanAlphabet } from './js/syllables_data.js';
      import { bindAudioSpeed } from './js/audio-helper.js';

      // Apply translations on load
  // Apply translations safely once the DOM / custom elements are fully settled
      window.addEventListener('DOMContentLoaded', () => {
        const subtitleElem = document.getElementById('subtitleText');
        const baseOnlyElem = document.getElementById('labelNone');
      
        if (subtitleElem) subtitleElem.textContent = t('headLetters');
        if (baseOnlyElem) baseOnlyElem.textContent = t('none');
      });

      // Page Title Audio Clip
      const titleAudio = bindAudioSpeed(new Audio("audio/headletters/headletters_title.mp3"));
      titleAudio.preload = 'auto';

      const titleAudioBtn = document.getElementById('titleAudioBtn');
      let currentAudio = null;
      let currentCard = null;

      function stopAudio() {
        if (currentAudio) {
          currentAudio.pause();
          currentAudio.currentTime = 0;
          if (currentCard) currentCard.classList.remove('playing');
        }
      }

      if (titleAudioBtn) {
        titleAudioBtn.addEventListener('click', () => {
          stopAudio();
          titleAudio.currentTime = 0;
          titleAudio.play().catch(err => console.log("Title audio playback prevented or file missing"));
          currentAudio = titleAudio;
        });
      }

      // Dedicated standalone audio for the head letter names
      const headLetterAudio = {
        ra: bindAudioSpeed(new Audio("audio/headletters/rago.mp3")),
        la: bindAudioSpeed(new Audio("audio/headletters/lago.mp3")),
        sa: bindAudioSpeed(new Audio("audio/headletters/sago.mp3"))
      };

      /* Head Letter Mappings */
/* Head Letter Mappings with explicit Romanization and Tones */
	  const headLetterData = {
	    ra: {
	      "01_ka":  { tib: "རྐ", soundShift: false },
	      "03_kaa": { tib: "རྒ", soundShift: true, toneKey: "tone_harder_sound", eng: "gaa" },
	      "04_nga": { tib: "རྔ", soundShift: true, toneKey: "tone_high_tune" },
	      "07_chaa":{ tib: "རྗ", soundShift: true, toneKey: "tone_harder_sound", eng: "jaa" },
	      "08_nya": { tib: "རྙ", soundShift: true, toneKey: "tone_high_tune" },
	      "09_ta":  { tib: "རྟ", soundShift: false },
	      "11_taa": { tib: "རྡ", soundShift: true, toneKey: "tone_harder_sound", eng: "daa" },
	      "12_na":  { tib: "རྣ", soundShift: true, toneKey: "tone_high_tune" },
	      "15_paa": { tib: "རྦ", soundShift: true, toneKey: "tone_harder_sound", eng: "baa" },
	      "16_ma":  { tib: "རྨ", soundShift: true, toneKey: "tone_high_tune" },
	      "17_tsa": { tib: "རྩ", soundShift: false },
	      "19_tsaa":{ tib: "རྫ", soundShift: true, toneKey: "tone_harder_sound", eng: "dzaa" }
	    },
	    la: {
	      "01_ka":  { tib: "ལྐ", soundShift: false },
	      "03_kaa": { tib: "ལྒ", soundShift: true, toneKey: "tone_harder_sound", eng: "gaa" },
	      "04_nga": { tib: "ལྔ", soundShift: true, toneKey: "tone_high_tune" },
	      "05_cha": { tib: "ལྕ", soundShift: false },
	      "07_chaa":{ tib: "ལྗ", soundShift: true, toneKey: "tone_harder_sound", eng: "ljaa" },
	      "09_ta":  { tib: "ལྟ", soundShift: false },
	      "11_taa": { tib: "ལྡ", soundShift: true, toneKey: "tone_harder_sound", eng: "ldaa" },
	      "13_pa":  { tib: "ལྤ", soundShift: false },
	      "15_paa": { tib: "ལྦ", soundShift: true, toneKey: "tone_harder_sound", eng: "lbaa" },
	      "29_ha":  { tib: "ལྷ", soundShift: true, toneKey: "tone_high_asp_sharp", eng: "lha" }
	    },
	    sa: {
	      "01_ka":  { tib: "སྐ", soundShift: false },
	      "03_kaa": { tib: "སྒ", soundShift: true, toneKey: "tone_harder_sound", eng: "gaa" },
	      "04_nga": { tib: "སྔ", soundShift: true, toneKey: "tone_high_tune" },
	      "08_nya": { tib: "སྙ", soundShift: true, toneKey: "tone_high_tune" },
	      "09_ta":  { tib: "སྟ", soundShift: false },
	      "11_taa": { tib: "སྡ", soundShift: true, toneKey: "tone_harder_sound", eng: "sdaa" },
	      "12_na":  { tib: "སྣ", soundShift: true, toneKey: "tone_high_tune" },
	      "13_pa":  { tib: "སྤ", soundShift: false },
	      "15_paa": { tib: "སྦ", soundShift: true, toneKey: "tone_harder_sound", eng: "sbaa" },
	      "16_ma":  { tib: "སྨ", soundShift: true, toneKey: "tone_high_tune" },
	      "17_tsa": { tib: "སྩ", soundShift: false }
	    }
	  };

      const grid = document.getElementById('alphabetGrid');
      const headLetterRadios = document.querySelectorAll('input[name="headLetterSelect"]');
      let activeHeadLetter = "none";
	  

	// Listen for changes from the radio buttons anywhere on the page (even inside shadow DOM if it bubbles)
	document.addEventListener('change', (event) => {
	  if (event.target && event.target.name === 'headLetterSelect') {
	    activeHeadLetter = event.target.value;

	    // Play standalone head letter audio if selected and available
	    if (activeHeadLetter !== 'none' && headLetterAudio[activeHeadLetter]) {
	      stopAudio();
	      headLetterAudio[activeHeadLetter].currentTime = 0;
	      headLetterAudio[activeHeadLetter].play().catch(err => console.log("Head letter audio error"));
	      currentAudio = headLetterAudio[activeHeadLetter];
	    }

	    renderGrid();
	  }
	});

	  function renderGrid() {
	        grid.innerHTML = '';

	        tibetanAlphabet.forEach(item => {
	          let displayTibetan = item.tib;
	          let audioPath = `audio/syllables/${item.id}.mp3`;
	          let hasShift = false;
	          let shiftExplanation = null;
	          let isDisabled = false;

	// Default to base item properties
	          let displayRom = item.eng || '';
	          let displayToneKey = item.toneKey || '';

	          if (activeHeadLetter !== "none") {
	            const currentMap = headLetterData[activeHeadLetter];
	            const comboData = currentMap ? currentMap[item.id] : null;

				if (comboData) {
	              displayTibetan = comboData.tib;
	              hasShift = comboData.soundShift === true;

	              // Translate the tone key if present, otherwise null
	              shiftExplanation = comboData.toneKey ? t(comboData.toneKey) : null;

	              displayRom = (hasShift && comboData.eng) ? comboData.eng : item.eng;
	              displayToneKey = (hasShift && comboData.toneKey) ? comboData.toneKey : item.toneKey;

	              if (!hasShift) {
	                audioPath = `audio/syllables/${item.id}.mp3`;
	              } else {
	                audioPath = `audio/headletters/${item.id}_${activeHeadLetter}.mp3`;
	              }
	            } else {
	              isDisabled = true;
	            }
	          }

			  const card = createSyllableCard({
	              id: item.id,
	              script: displayTibetan,
	              romanization: displayRom,
	              tone: hasShift ? shiftExplanation : (displayToneKey ? t(displayToneKey) : ''),
	              hasSoundShift: hasShift,
	              shiftExplanation: shiftExplanation,
	              isDisabled: isDisabled
	          });

	          if (!isDisabled) {
	            const audioObj = bindAudioSpeed(new Audio(audioPath));
	            audioObj.preload = 'auto';

	            card.addEventListener('click', () => {
	              stopAudio();
	              card.classList.add('playing');
	              audioObj.play().catch(error => console.error("Audio error:", audioPath));
	              currentAudio = audioObj;
	              currentCard = card;
	              audioObj.onended = () => card.classList.remove('playing');
	            });
	          }

	          grid.appendChild(card);
	        });
	      }

      renderGrid();
    </script>
</body>
</html>
